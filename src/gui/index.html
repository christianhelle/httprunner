<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HTTP File Runner - Execute HTTP requests from .http files">
    <title>HTTP File Runner</title>
    <link data-trunk rel="rust" data-target-name="httprunner_gui_lib" data-wasm-opt-params="--enable-bulk-memory --enable-bulk-memory-opt --enable-nontrapping-float-to-int" />
    <style>
        html, body, #main {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        body {
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        #loading_text {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            color: white;
            text-align: center;
        }

        .spinner {
            margin: 20px auto;
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading_text">
        <div>
            <h1>HTTP File Runner</h1>
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>
    <div id="main"></div>
    <script>
        const root = document.getElementById("main");
        const loading = document.getElementById("loading_text");
        const observer = new MutationObserver(() => {
            if (root && root.children.length > 0) {
                loading?.remove();
                observer.disconnect();
            }
        });
        observer.observe(root, { childList: true, subtree: true });
    </script>
</body>
</html>
